# Spacious map variant: the city AND its road network keep their default
# size and spacing — only the map itself gets bigger. The result is a big
# empty buffer of open space between the outermost road ring and the new
# (farther) boundary where attack entry points sit.

env:
  T: 240                    # longer horizon: drones cross a much wider buffer
  dt: 1.0
  n_drones: 10
  n_defenders: 5
  city_radius: 0.126        # unchanged from default
  city_center: [0.5, 0.5]
  # Playable area (xmin, ymin, xmax, ymax). Was [0,1]^2; now a 2x2 square
  # centered on the city. Entry points (on the new boundary) are ~2x farther
  # from the city, and the open space outside the outer ring roughly
  # quadruples in area.
  map_bounds: [-0.5, -0.5, 1.5, 1.5]
  # Leave ring_radii / nodes_per_ring unset so build_fixed_map uses the
  # default layout (inner 0.145, mid 0.240, outer 0.365 from city center) —
  # the road network looks identical to the default map.
  drone_max_speed: 0.020
  drone_max_accel: 0.010
  defender_road_speed: 0.012
  defender_intercept_radius: 0.035
  tactical_decision_interval: 4
  n_entry_points: 8
  n_route_templates: 6
  seed: 0
  defender_visible_prob: 0.5

rewards:
  attacker:
    reach_city: 10.0
    drone_destroyed: -5.0
  defender:
    drone_destroyed: 5.0
    reach_city: -10.0
    move_penalty: 0.0

training:
  tactical:
    total_timesteps: 200000
    n_envs: 4
    lr: 3.0e-4
  attacker:
    total_timesteps: 60000
    n_envs: 4
    lr: 3.0e-4
  deployment:
    total_timesteps: 40000
    n_envs: 4
    lr: 3.0e-4
